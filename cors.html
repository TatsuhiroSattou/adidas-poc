<body>

<h2>Adidas Account CORS Test</h2>
<pre id="output">Cargando respuesta...</pre>

<script>
fetch("https://www.adidas.com/ec/es/account", {
    method: "GET",
    credentials: "include"
})
.then(response => response.text())
.then(data => {
    document.getElementById("output").textContent = data;
    console.log("Respuesta recibida:");
    console.log(data);
})
.catch(error => {
    document.getElementById("output").textContent = "Error: " + error;
    console.error("Fetch error:", error);
});
</script>

</body>
</html>
